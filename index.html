<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
<style>
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <div class="notch"></div>
    <div class="calculator">
      <div class="display-wrap">
        <div class="history" id="history"></div>
        <div class="display" id="display">0</div>
      </div>

      <div class="keys">
        <button class="key mid" data-action="clear" id="clearBtn">AC</button>
        <button class="key mid" data-action="negate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M4 12l5-5M4 12l5 5"/></svg>
        </button>
        <button class="key mid" data-action="percent">%</button>
        <button class="key orange" data-action="divide">÷</button>

        <button class="key dark" data-action="number" data-value="7">7</button>
        <button class="key dark" data-action="number" data-value="8">8</button>
        <button class="key dark" data-action="number" data-value="9">9</button>
        <button class="key orange" data-action="multiply">×</button>

        <button class="key dark" data-action="number" data-value="4">4</button>
        <button class="key dark" data-action="number" data-value="5">5</button>
        <button class="key dark" data-action="number" data-value="6">6</button>
        <button class="key orange" data-action="subtract">−</button>

        <button class="key dark" data-action="number" data-value="1">1</button>
        <button class="key dark" data-action="number" data-value="2">2</button>
        <button class="key dark" data-action="number" data-value="3">3</button>
        <button class="key orange" data-action="add">+</button>

        <button class="key dark zero" data-action="number" data-value="0">0</button>
        <button class="key dark" data-action="decimal">.</button>
        <button class="key orange" data-action="equals">=</button>
      </div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
